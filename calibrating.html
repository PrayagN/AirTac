<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Obsidian Arena - Calibrating Reality</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#222a3d",
                        "tertiary-container": "#9945e8",
                        "on-surface-variant": "#c7c4d7",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "background": "#0b1326",
                        "on-secondary-fixed": "#111c2d",
                        "on-primary-container": "#faf7ff",
                        "tertiary-fixed-dim": "#ddb7ff",
                        "tertiary-fixed": "#f0dbff",
                        "primary-container": "#5d60eb",
                        "on-tertiary-fixed-variant": "#6900b3",
                        "on-tertiary-fixed": "#2c0051",
                        "tertiary": "#ddb7ff",
                        "primary-fixed": "#e1e0ff",
                        "on-tertiary": "#490080",
                        "inverse-primary": "#494bd6",
                        "secondary-fixed-dim": "#bcc7de",
                        "secondary-fixed": "#d8e3fb",
                        "on-secondary-fixed-variant": "#3c475a",
                        "surface-variant": "#2d3449",
                        "on-secondary-container": "#aeb9d0",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-container-low": "#131b2e",
                        "surface-dim": "#0b1326",
                        "on-background": "#dae2fd",
                        "surface-bright": "#31394d",
                        "secondary": "#bcc7de",
                        "surface-container-lowest": "#060e20",
                        "on-primary-fixed": "#07006c",
                        "on-tertiary-container": "#fff6ff",
                        "inverse-on-surface": "#283044",
                        "primary": "#c0c1ff",
                        "surface-tint": "#c0c1ff",
                        "inverse-surface": "#dae2fd",
                        "surface-container-highest": "#2d3449",
                        "outline-variant": "#464555",
                        "on-secondary": "#263143",
                        "surface-container": "#171f33",
                        "error-container": "#93000a",
                        "surface": "#0b1326",
                        "outline": "#908fa0",
                        "on-surface": "#dae2fd",
                        "secondary-container": "#3e495d",
                        "error": "#ffb4ab",
                        "on-primary": "#1000a9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        @keyframes rotate-slow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes rotate-fast {
            from { transform: translate(-50%, -50%) rotate(360deg); }
            to { transform: translate(-50%, -50%) rotate(0deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; filter: blur(40px); }
            50% { opacity: 0.8; filter: blur(60px); }
        }
        @keyframes particle-drift {
            from { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.6; }
            to { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        .shard-glow {
            background: radial-gradient(circle, rgba(192, 193, 255, 0.4) 0%, rgba(93, 96, 235, 0.1) 60%, transparent 100%);
        }
        .obsidian-dust {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #c0c1ff;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Atmospheric Particles (Obsidian Dust) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="obsidian-dust absolute bottom-[-10px] left-[10%]" style="animation: particle-drift 8s linear infinite;"></div>
<div class="obsidian-dust absolute bottom-[-10px] left-[30%]" style="animation: particle-drift 12s linear infinite; animation-delay: 2s;"></div>
<div class="obsidian-dust absolute bottom-[-10px] left-[50%]" style="animation: particle-drift 10s linear infinite; animation-delay: 5s;"></div>
<div class="obsidian-dust absolute bottom-[-10px] left-[70%]" style="animation: particle-drift 15s linear infinite; animation-delay: 1s;"></div>
<div class="obsidian-dust absolute bottom-[-10px] left-[90%]" style="animation: particle-drift 9s linear infinite; animation-delay: 7s;"></div>
<div class="obsidian-dust absolute bottom-[-10px] left-[25%]" style="animation: particle-drift 11s linear infinite; animation-delay: 4s;"></div>
<div class="obsidian-dust absolute bottom-[-10px] left-[85%]" style="animation: particle-drift 14s linear infinite; animation-delay: 3s;"></div>
</div>
<!-- Center Composition -->
<div class="relative w-96 h-96 flex items-center justify-center">
<!-- Rotating Calibration Rings -->
<div class="absolute top-1/2 left-1/2 w-80 h-80 border border-primary/20 rounded-full" style="animation: rotate-slow 20s linear infinite;">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-primary rounded-full shadow-[0_0_10px_rgba(192,193,255,1)]"></div>
</div>
<div class="absolute top-1/2 left-1/2 w-[22rem] h-[22rem] border border-primary-container/10 border-dashed rounded-full" style="animation: rotate-fast 15s linear infinite;"></div>
<div class="absolute top-1/2 left-1/2 w-[26rem] h-[26rem] border-2 border-white/5 rounded-full" style="animation: rotate-slow 40s linear reverse infinite;">
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-tertiary rounded-full"></div>
</div>
<!-- Inner Ambient Glow -->
<div class="absolute w-64 h-64 shard-glow rounded-full" style="animation: pulse-glow 4s ease-in-out infinite;"></div>
<!-- The Central Shard -->
<div class="relative z-10 flex items-center justify-center" style="animation: float 6s ease-in-out infinite;">
<div class="w-48 h-64 bg-surface-container-highest relative overflow-hidden shadow-2xl" style="clip-path: polygon(50% 0%, 100% 20%, 80% 80%, 50% 100%, 20% 80%, 0% 20%);">
<!-- Shard Texture Overlay -->
<div class="absolute inset-0 opacity-40 bg-gradient-to-tr from-surface-container-lowest via-surface-container-high to-primary/20"></div>
<!-- Inner Light Pulse -->
<div class="absolute inset-0 bg-primary/10 backdrop-blur-sm" style="animation: pulse-glow 3s ease-in-out infinite;"></div>
<!-- Shard Reflection -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-white/10 to-transparent"></div>
</div>
<!-- Decorative Ghost Borders for Shard -->
<div class="absolute w-[13rem] h-[17rem] border border-primary/10" style="clip-path: polygon(50% 0%, 100% 20%, 80% 80%, 50% 100%, 20% 80%, 0% 20%);"></div>
</div>
</div>
<!-- Text Metadata -->
<div class="mt-24 text-center z-20">
<h2 class="text-primary font-headline text-sm tracking-[0.4em] uppercase font-light opacity-80 mb-2">
            Calibrating Reality
        </h2>
<p class="text-secondary font-label text-[10px] tracking-widest uppercase opacity-40">
            Syncing Nexus Sequence 09-X
        </p>
</div>
<!-- Minimalist Progress Bar -->
<div class="fixed bottom-16 left-1/2 -translate-x-1/2 w-64">
<div class="h-[2px] w-full bg-surface-container-highest rounded-full overflow-hidden relative">
<!-- Glow Trail -->
<div class="absolute top-0 left-0 h-full w-1/3 bg-gradient-to-r from-transparent via-primary to-transparent blur-[2px]" style="left: 20%;"></div>
<!-- Main Progress Fill -->
<div class="h-full bg-primary shadow-[0_0_15px_rgba(192,193,255,0.6)]" style="width: 42%;"></div>
</div>
<div class="flex justify-between items-center mt-3">
<span class="text-[9px] font-label text-primary/40 tracking-tighter">DATA_STREAM: ACTIVE</span>
<span class="text-[9px] font-label text-primary tracking-widest">42%</span>
</div>
</div>
<!-- Subtle Brand Anchor -->
<div class="fixed top-12 left-1/2 -translate-x-1/2 pointer-events-none">
<span class="font-headline text-xs tracking-[0.6em] font-black text-primary/20 uppercase">Obsidian Arena</span>
</div>
<!-- Corner Decorative Elements -->
<div class="fixed top-8 left-8 border-l border-t border-primary/10 w-8 h-8 opacity-40"></div>
<div class="fixed top-8 right-8 border-r border-t border-primary/10 w-8 h-8 opacity-40"></div>
<div class="fixed bottom-8 left-8 border-l border-b border-primary/10 w-8 h-8 opacity-40"></div>
<div class="fixed bottom-8 right-8 border-r border-b border-primary/10 w-8 h-8 opacity-40"></div>
</body></html>
